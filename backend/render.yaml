services:
  - type: web
    name: dognose-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && mkdir -p models && curl -L -o models/detector.onnx "https://github.com/SKKammar/DogNose/releases/download/v0.1.0-models/detector.onnx" && curl -L -o models/embedder.onnx "https://github.com/SKKammar/DogNose/releases/download/v0.1.0-models/embedder.onnx"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
